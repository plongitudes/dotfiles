# let's use tmux-256color.

# as of 2023/08/05, macOS's shipping ncurses is 5.7 and doesn't work consistently. you might need to:
# (assuming a Homebrew install, a homebrew install of zsh and tmux which depends on ncurses):
# > /opt/homebrew/Cellar/ncurses/6.4/bin/infocmp -x tmux-256color > ~/tmux-256color
# search for pattern 'pairs#0x10000' or 'pairs#65536'
# replace it with 'pairs#32767'
# then with `tic` from the older install of ncurses:
# > /usr/bin/tic -x -o $HOME/.local/share/terminfo tmux-256color.src
# and then modify your environment to look for this new term info -- probably want to add it to .zshrc
# > export TERMINFO_DIRS=$TERMINFO_DIRS:$HOME/.local/share/terminfo

###########################
### color compatibility ###
###########################

# autodetect 256 color support
# (remember that $TERM is overridden to `screen' here and isn't the "owner" terminal's val once inside tmux's proc)
if-shell 'test $(tput colors) -ge 256' \
    'set -g default-terminal "tmux-256color"' \
    'set-option -g default-terminal tmux'

################################
### configuration / settings ###
################################

# terminal overrides, because I'm smarter than ncurses
# truecolor! (in normal and nested sessions)
set -ga terminal-overrides ",xterm-256color:Tc,tmux-256color:Tc"
# italics!
set -ga terminal-overrides ',xterm*:sitm=\E[3m'
# cursor shape?
set -ga terminal-overrides ',tmux*:Ss=\E[%p1%d q:Se=\E[2 q'
# terminal features (fingers crossed)
set -as terminal-features ',xterm-256color:clipboard'

# allow clipboard munging from inside
set -s set-clipboard on
# turning this on but hoping it doesn't fuck up copypaste again
set-option -g allow-passthrough on

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# vi mode keys
set-option -g status-keys vi
set-window-option -g mode-keys vi

# set window title from nvim
#set-window-option -g window-status-current-format "[#I #W#T]"
#set-window-option -g window-status-format "[#I #W#T]"

# history size
set-option -g history-limit 1000000000

# unfuck vim and the esc key
# set -sg escape-time 0

# automatic window renaming
set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

#####################
### key  mappings ###
#####################

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# new windows to the right instead of left
bind c new-window -a -c "#{pane_current_path}"

# split panes using y (horiz) and o (vert) — picked to avoid colliding with
# OSC/CSI escape traffic (=, -, _, +, [, ] are common in escape-sequence
# payloads and were causing false split-window triggers)
bind -n M-o split-window -h -c "#{pane_current_path}"
bind -n M-y split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# reload config file. programs.tmux (home-manager) writes the generated config
# to the XDG path, not ~/.tmux.conf. `switch` also auto-reloads in-session.
bind r source-file ~/.config/tmux/tmux.conf

# try to go into copy mode without the prefix
bind -n M-/ copy-mode

#flipping the orientation of the current pane with the pane <arrow-way>-of
bind -n M-H move-pane -t '.{left-of}'
bind -n M-J move-pane -h -t '.{down-of}'
bind -n M-K move-pane -h -t '.{up-of}'
bind -n M-L move-pane -t '.{right-of}'

# move current pane into chosen window
bind-key m choose-window -F "#{window_index}: #{window_name}" "join-pane -h -t %%"
bind-key M choose-window -F "#{window_index}: #{window_name}" "join-pane -v -t %%"

# switch panes using Alt-hjkl without prefix
# note: disabled in favor of vim-tmux-navigator below
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# switch windows with alt-u|i
bind -n M-u select-window -p
bind -n M-i select-window -n


# Pane navigation handled by smart-splits.nvim (works across tmux + wezterm).
# Copy-mode pane switching still uses tmux bindings directly.
bind-key -T copy-mode-vi 'M-h' select-pane -L
bind-key -T copy-mode-vi 'M-j' select-pane -D
bind-key -T copy-mode-vi 'M-k' select-pane -U
bind-key -T copy-mode-vi 'M-l' select-pane -R
bind-key -T copy-mode-vi 'M-\' select-pane -l
bind-key -T copy-mode-vi 'M-Space' select-pane -t:.+
#-------- end new stuff

# Scroll by pgdn/pgup or number of lines (-N<n>)
#bind-key -T copy-mode-vi WheelDownPane send-keys -X page-down-and-cancel
#bind-key -T copy-mode-vi WheelUpPane send-keys -X page-up

bind -T copy-mode-vi WheelDownPane send -N3 -X scroll-down-and-cancel
bind -T copy-mode-vi WheelUpPane send -N3 -X scroll-up

# Don't overwrite scroll for tools that already know about it.
bind-key -n WheelDownPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send -M" "copy-mode -e"

# clear screen with ctrl-L
bind-key -n C-l send-keys -R Enter\; clear-history

# alt-z to zoom current pane
unbind C-Space
bind-key -n M-z resize-pane -Z

# Make `y` copy the selected text, not exiting the copy mode. For copy-and-exit
# use ordinary `Enter`
set -g @yank_action 'copy-pipe'
# unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe
# bind -T copy-mode-vi MouseDown1Pane send-keys -X clear-selection \; select-pane
bind -T copy-mode-vi MouseDown1Pane send-keys -X copy-pipe \; select-pane
bind -T copy-mode-vi y send-keys -X copy-pipe  # Only copy, no page-down-and-cancel

# Don't overwrite scroll for tools that already know about it.
bind-key -n WheelDownPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send -M" "copy-mode -e"

# --- pane resize -------------------------------------------------------------
# Quick coarse resize of shell panes (kept).
bind -n C-Left  resize-pane -L 10
bind -n C-Right resize-pane -R 10
bind -n C-Up    resize-pane -U 5
bind -n C-Down  resize-pane -D 5

# Drop tmux's overlapping DEFAULT resize bindings from the prefix table
# (C-arrow step 1, M-arrow step 5 — the latter often dead on macOS Option).
unbind -T prefix C-Up ; unbind -T prefix C-Down ; unbind -T prefix C-Left ; unbind -T prefix C-Right
unbind -T prefix M-Up ; unbind -T prefix M-Down ; unbind -T prefix M-Left ; unbind -T prefix M-Right

# Adaptive resize MODE: Opt-r enters a sticky 'resize' table; h/j/k/l resize with
# a step that eases as the moving border nears an edge (see bin/tmux-resize-adaptive).
# q / Escape / Enter exit. @resizing gates the status badge below.
bind -n M-r set -g key-table resize \; set -g @resizing 1 \; refresh-client -S
bind -T resize h run-shell "$HOME/.dotfiles/bin/tmux-resize-adaptive L"
bind -T resize l run-shell "$HOME/.dotfiles/bin/tmux-resize-adaptive R"
bind -T resize k run-shell "$HOME/.dotfiles/bin/tmux-resize-adaptive U"
bind -T resize j run-shell "$HOME/.dotfiles/bin/tmux-resize-adaptive D"
bind -T resize q      set -g key-table root \; set -g @resizing 0 \; refresh-client -S
bind -T resize Escape set -g key-table root \; set -g @resizing 0 \; refresh-client -S
bind -T resize Enter  set -g key-table root \; set -g @resizing 0 \; refresh-client -S

# RESIZE indicator in the status line while the mode is active (appended after
# gruvbox, which loads first).
set -ga status-right "#{?#{==:#{@resizing},1},#[fg=black bg=colour208 bold] RESIZE #[default],}"

# NOTE: window-status-current-format is left to gruvbox (it themes the active
# window). A hand-rolled override here would win — home-manager loads gruvbox
# BEFORE this extraConfig — so it's removed. (Re-add a zoomed-pane indicator
# layered onto gruvbox's format if you want one back.)

# switch between light and dark themes
bind-key M-q set -g @tmux-gruvbox 'light'
bind-key M-w set -g @tmux-gruvbox 'dark'

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
#set -g visual-activity off
#set -g visual-bell off
#set -g visual-silence off
#setw -g monitor-activity off
set -g bell-action none

# modes
setw -g clock-mode-colour colour5
setw -g mode-style 'fg=colour1 bg=colour18 bold'

# panes
set -g pane-border-style 'bg=colour233 fg=colour234'
set -g pane-active-border-style 'bg=colour233 fg=colour101'

# I find this together with default coloring of the active pane border sufficient
set -g pane-border-lines heavy

# More explicit options that I find a bit excessive
set -g pane-border-indicators both # Displays arrows pointing to the current pane.

# Inactive pane bg
set -g window-style 'bg=default'
set -g pane-border-style 'bg=default'
# Active pane bg
set -g window-active-style 'bg=default'
set -g pane-active-border-style 'bg=default'


#######################
### plugin settings ###
#######################
# Plugins are declared in home/tonye/shell.nix (programs.tmux.plugins), pinned
# by flake.lock — no more TPM, no more ~/.tmux/plugins.
#
# home-manager loads the plugins BEFORE this extraConfig (the reverse of TPM's
# `run tpm`-at-the-bottom). So LOAD-TIME plugin vars — @tmux-gruvbox,
# @resurrect-strategy-*, @continuum-restore — are set via each plugin's
# per-plugin extraConfig in shell.nix, NOT here; setting them here would apply
# them too late (gruvbox unthemed, continuum boot-restore off). RUNTIME-only
# vars like @yank_action (read when you copy) are fine to keep in this file.
# (tmux-autoreload was dropped — not in nixpkgs; `switch` reloads the live
# server after a rebuild instead.)
